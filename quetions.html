<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        /* Font */
        --font-rubik: "Rubik", sans-serif;

        /* Base Colors */
        --color-white: #ffffff;
        --color-black: #000000;

        /* Grey Palette */
        --color-gray-50: #f4f6fa;
        --color-gray-500: #626c7f;

        /* Blue Palette */
        --color-blue-50: #ebf0ff;
        --color-blue-100: #edf1f9;
        --color-blue-300: #abc1e1;
        --color-blue-500: #306aff;
        --color-blue-850: #3b4d66;
        --color-blue-900: #313e51;
        --color-blue-950: #2d3949;

        /* Green Palette */
        --color-green-100: #e0fdef;
        --color-green-500: #2fd887;

        /* Purple Palette */
        --color-purple-100: #f6e7ff;
        --color-purple-600: #a729f5;

        /* Orange Palette */
        --color-orange-50: #fff5ed;
        --color-orange-400: #ff7e35;

        /* Red Palette */
        --color-red-500: #ee5454;

        /* TYPOGHRAPHY  */
        /* Desktop Type Scale */
        --text-h1: 144px;
        --text-h1-line-height: 144px;
        --text-h1-font-weight: 500;

        --text-h2: 64px;
        --text-h2-line-height: 64px;
        --text-h2-font-weight: 500;

        --text-h2-light: 64px;
        --text-h2-light-line-height: 64px;
        --text-h2-light-font-weight: 300;

        --text-h3: 36px;
        --text-h3-line-height: 43px;
        --text-h3-font-weight: 500;

        --text-h4: 28px;
        --text-h4-line-height: 28px;
        --text-h4-font-weight: 500;

        --text-h5: 24px;
        --text-h5-line-height: 36px;
        --text-h5-font-weight: 500;

        --text-h5-regular: 24px;
        --text-h5-regular-line-height: 36px;
        --text-h5-regular-font-weight: 400;

        --text-h6: 20px;
        --text-h6-line-height: 30px;
        --text-h6-font-weight: 400;

        /* Mobile Type Scale */
        --text-h1-mobile: 88px;
        --text-h1-mobile-line-height: 88px;
        --text-h1-mobile-font-weight: 500;

        --text-h2-mobile: 40px;
        --text-h2-mobile-line-height: 40px;
        --text-h2-mobile-font-weight: 500;

        --text-h2-mobile-light: 40px;
        --text-h2-mobile-light-line-height: 40px;
        --text-h2-mobile-light-font-weight: 300;

        --text-h3-mobile: 20px;
        --text-h3-mobile-line-height: 24px;
        --text-h3-mobile-font-weight: 500;

        --text-h4-mobile: 18px;
        --text-h4-mobile-line-height: 18px;
        --text-h4-mobile-font-weight: 500;

        --text-h5-mobile: 14px;
        --text-h5-mobile-line-height: 21px;
        --text-h5-mobile-font-weight: 400;

        /* Tablet Type Scale */
        --text-h2-tablet: 48px;
        --text-h2-tablet-line-height: 48px;
        --text-h2-tablet-font-weight: 500;

        --text-h2-tablet-light: 48px;
        --text-h2-tablet-light-line-height: 48px;
        --text-h2-tablet-light-font-weight: 300;

        --text-h3-tablet: 28px;
        --text-h3-tablet-line-height: 34px;
        --text-h3-tablet-font-weight: 500;

        --text-h4-tablet: 24px;
        --text-h4-tablet-line-height: 24px;
        --text-h4-tablet-font-weight: 500;

        --text-h6-tablet: 18px;
        --text-h6-tablet-line-height: 27px;
        --text-h6-tablet-font-weight: 400;
      }
    </style>
  </head>
  <body
    class="bg-blue-900 min-h-screen relative font-rubik text-white"
  >
    <img
      src="/assets/icons/bgleft.svg"
      alt=""
      class="absolute top-0 left-0 -z-10 pointer-events-none"
    />
    <img
      src="/assets/icons/bgright.svg"
      alt=""
      class="absolute bottom-0 right-0 -z-10 pointer-events-none"
    />

    <header
      class="max-w-[1160px] mx-auto w-full px-6 pt-8 md:pt-14 lg:pt-24 flex justify-end items-center"
    >
      <div class="flex items-center gap-2 md:gap-4">
        <img
          src="./assets/icons/sunny.svg"
          class="w-4 h-4 md:w-6 md:h-6"
          alt="Light Theme"
        />
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" class="sr-only peer" checked />
          <div
            class="w-8 h-5 md:w-12 md:h-7 bg-purple-600 rounded-full transition-colors"
          ></div>
          <div
            class="absolute left-1 top-1 w-3 h-3 md:w-5 md:h-5 bg-white rounded-full transition-transform peer-checked:translate-x-3 md:peer-checked:translate-x-5"
          ></div>
        </label>
        <img
          src="./assets/icons/moon.svg"
          class="w-4 h-4 md:w-6 md:h-6"
          alt="Dark Theme"
        />
      </div>
    </header>

    <main
      class="max-w-[1160px] mx-auto w-full px-6 mt-8 md:mt-12 lg:mt-24 flex flex-col lg:flex-row justify-between gap-10 lg:gap-32 pb-20"
    >
      <section class="flex-1 lg:max-w-[50%] flex flex-col min-h-[400px]">
        <p
          id="question-counter"
          class="text-[14px] md:text-[20px] italic text-blue-300 mb-3 md:mb-7"
        >
          Loading...
        </p>

        <h2
          id="question-title"
          class="text-[20px] md:text-[36px] font-medium leading-tight mb-10"
        >
          Loading question...
        </h2>

        <div class="mt-auto w-full h-4 bg-blue-850 rounded-full p-1">
          <div
            id="progress-bar"
            class="h-full bg-purple-600 rounded-full w-[0%] transition-all duration-300"
          ></div>
        </div>
      </section>

      <section class="flex-1 w-full flex flex-col gap-3 md:gap-6">
        <div id="options-container" class="flex flex-col gap-3 md:gap-6"></div>

        <button
          id="submit-btn"
          class="w-full bg-purple-600 hover:bg-purple-600/50 transition-colors text-white text-[18px] md:text-[28px] font-medium py-3 md:py-6 rounded-xl md:rounded-3xl mt-3 md:mt-2 shadow-lg"
        >
          Submit Answer
        </button>

        <div
          id="error-message"
          class="text-red-500 flex items-center justify-center gap-2 mt-3 hidden"
        >
          <div id="error-icon-container"></div>
          <span class="text-[18px] md:text-[24px]"
            >Please select an answer</span
          >
        </div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
