<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        /* Base Colors */
        --color-white: #ffffff;
        --color-black: #000000;

        /* Grey Palette */
        --color-gray-50: #f4f6fa;
        --color-gray-500: #626c7f;

        /* Blue Palette */
        --color-blue-50: #ebf0ff;
        --color-blue-100: #edf1f9;
        --color-blue-300: #abc1e1;
        --color-blue-500: #306aff;
        --color-blue-850: #3b4d66;
        --color-blue-900: #313e51;
        --color-blue-950: #2d3949;

        /* Green Palette */
        --color-green-100: #e0fdef;
        --color-green-500: #2fd887;

        /* Purple Palette */
        --color-purple-100: #f6e7ff;
        --color-purple-600: #a729f5;

        /* Orange Palette */
        --color-orange-50: #fff5ed;
        --color-orange-400: #ff7e35;

        /* Red Palette */
        --color-red-500: #ee5454;

        /* TYPOGHRAPHY  */

        /* Text Preset 1 */
        --text-preset-1: 144px;
        --text-preset-1--line-height: 100%;
        --text-preset-1--letter-spacing: 0px;
        /* Text Preset 1 Mobile */
        --text-preset-1-mobile: 88px;
        --text-preset-1-mobile--line-height: 100%;
        --text-preset-1-mobile--letter-spacing: 0px;

        /* Text Preset 2 medium */
        --text-preset-2-medium: 64px;
        --text-preset-2-medium--line-height: 100%;
        --text-preset-2-medium--font-weight: 500;
        --text-preset-2-medium--letter-spacing: 0px;

        /* Text Preset 2 mobile medium */
        --text-preset-2-mobile-medium: 40px;
        --text-preset-2-mobile-medium--line-height: 100%;
        --text-preset-2-mobile-medium--font-weight: 500;
        --text-preset-2-mobile-medium--letter-spacing: 0px;

        /* Text Preset 2 light */
        --text-preset-2-light: 64px;
        --text-preset-2-light--line-height: 100%;
        --text-preset-2-light--font-weight: 300;
        --text-preset-2-light--letter-spacing: 0px;

        /* Text Preset 2 mobile light */
        --text-preset-2-mobile-light: 40px;
        --text-preset-2-mobile-light--line-height: 100%;
        --text-preset-2-mobile-light--font-weight: 300;
        --text-preset-2-mobile-light--letter-spacing: 0px;

        /*text preset 3 medium */
        --text-preset-3: 36px;
        --text-preset-3--font-weight: 500;
        --text-preset-3--line-height: 120%;
        --text-preset-3--letter-spacing: 0px;

        /* Text Preset 3 Mobile medium */
        --text-preset-3-mobile: 20px;
        --text-preset-3-mobile--font-weight: 500;
        --text-preset-3-mobile--line-height: 120%;
        --text-preset-3-mobile--letter-spacing: 0px;

        /*text preset 4 medium */
        --text-preset-4: 28px;
        --text-preset-4--font-weight: 500;
        --text-preset-4--line-height: 100%;
        --text-preset-4--letter-spacing: 0px;
        /* Text Preset 4 Mobile medium */
        --text-preset-4-mobile: 18px;
        --text-preset-4-mobile--font-weight: 500;
        --text-preset-4-mobile--line-height: 100%;
        --text-preset-4-mobile--letter-spacing: 0px;

        /* Text Preset 5 medium */
        --text-preset-5: 24px;
        --text-preset-5--font-weight: 500;
        --text-preset-5--line-height: 150%;
        --text-preset-5--letter-spacing: 0px;
        /* Text Preset 5 Mobile italic  */
        --text-preset-5-mobile: 14px;
        --text-preset-5-mobile--font-style: italic;
        --text-preset-5-mobile--line-height: 150%;
        --text-preset-5-mobile--letter-spacing: 0px;
        /*Text preset 5 Regular*/
        --text-preset-5-regular: 24px;
        --text-preset-5-regular--font-weight: 400;
        --text-preset-5-regular--line-height: 150%;
        --text-preset-5-regular--letter-spacing: 0px;

        /* Text Preset 6 italic */
        --text-preset-6: 20px;
        --text-preset-6--font-style: italic;
        --text-preset-6--line-height: 150%;
        --text-preset-6--letter-spacing: 0px;

        /* SPACING */
        --spacing-100: 8px;
        --spacing-200: 16px;
        --spacing-300: 24px;
        --spacing-400: 32px;
        --spacing-500: 40px;
        --spacing-600: 48px;
        --spacing-800: 64px;
        --spacing-1600: 128px;
        --spacing-1800: 144px;
        --spacing-2300: 184px;
      }
    </style>
  </head>
  <body></body>
</html>
