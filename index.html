<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        /* Font */
        --font-rubik: "Rubik", sans-serif;

        /* Desktop Type Scale */
        --text-h1: 144px;
        --text-h1-line-height: 144px;
        --text-h1-font-weight: 500;

        --text-h2: 64px;
        --text-h2-line-height: 64px;
        --text-h2-font-weight: 500;

        --text-h2-light: 64px;
        --text-h2-light-line-height: 64px;
        --text-h2-light-font-weight: 300;

        --text-h3: 36px;
        --text-h3-line-height: 43px;
        --text-h3-font-weight: 500;

        --text-h4: 28px;
        --text-h4-line-height: 28px;
        --text-h4-font-weight: 500;

        --text-h5: 24px;
        --text-h5-line-height: 36px;
        --text-h5-font-weight: 500;

        --text-h5-regular: 24px;
        --text-h5-regular-line-height: 36px;
        --text-h5-regular-font-weight: 400;

        --text-h6: 20px;
        --text-h6-line-height: 30px;
        --text-h6-font-weight: 400;

        /* Mobile Type Scale */
        --text-h1-mobile: 88px;
        --text-h1-mobile-line-height: 88px;
        --text-h1-mobile-font-weight: 500;

        --text-h2-mobile: 40px;
        --text-h2-mobile-line-height: 40px;
        --text-h2-mobile-font-weight: 500;

        --text-h2-mobile-light: 40px;
        --text-h2-mobile-light-line-height: 40px;
        --text-h2-mobile-light-font-weight: 300;

        --text-h3-mobile: 20px;
        --text-h3-mobile-line-height: 24px;
        --text-h3-mobile-font-weight: 500;

        --text-h4-mobile: 18px;
        --text-h4-mobile-line-height: 18px;
        --text-h4-mobile-font-weight: 500;

        --text-h5-mobile: 14px;
        --text-h5-mobile-line-height: 21px;
        --text-h5-mobile-font-weight: 400;

        /* Tablet Type Scale */
        --text-h2-tablet: 48px;
        --text-h2-tablet-line-height: 48px;
        --text-h2-tablet-font-weight: 500;

        --text-h2-tablet-light: 48px;
        --text-h2-tablet-light-line-height: 48px;
        --text-h2-tablet-light-font-weight: 300;

        --text-h3-tablet: 28px;
        --text-h3-tablet-line-height: 34px;
        --text-h3-tablet-font-weight: 500;

        --text-h4-tablet: 24px;
        --text-h4-tablet-line-height: 24px;
        --text-h4-tablet-font-weight: 500;

        --text-h6-tablet: 18px;
        --text-h6-tablet-line-height: 27px;
        --text-h6-tablet-font-weight: 400;

        /* Colors */
        /* Base */
        --color-white: #ffffff;
        --color-black: #000000;

        /* Grey */
        --color-gray-500: #626c7f;
        --color-gray-50: #f4f6fa;

        /* Blue */
        --color-blue-950: #2d3949;
        --color-blue-900: #313e51;
        --color-blue-850: #3b4d66;
        --color-blue-500: #306aff;
        --color-blue-300: #abc1e1;
        --color-blue-100: #edf1f9;
        --color-blue-50: #ebf0ff;

        /* Green */
        --color-green-500: #2fd887;
        --color-green-100: #e0fdef;

        /* Purple */
        --color-purple-600: #a729f5;
        --color-purple-100: #f6e7ff;

        /* Orange */
        --color-orange-400: #ff7e35;
        --color-orange-50: #fff5ed;

        /* Red */
        --color-red-500: #ee5454;
        /* container */
        --size-container: 1230px;
      }
    </style>
  </head>
  <body class="bg-blue-900 min-h-screen relative font-rubik text-white overflow-x-hidden">
    <img
      src="/assets/icons/bgleft.svg"
      class="absolute top-0 left-0 -z-10 w-full sm:w-auto opacity-40 sm:opacity-60 lg:opacity-100"
    />
    <img
      src="/assets/icons/bgright.svg"
      class="hidden lg:block absolute bottom-0 right-0 -z-10 h-auto"
    />

    <header
      class="max-w-7xl mx-auto w-full px-4 sm:px-6 pt-6 sm:pt-10 md:pt-14 lg:pt-24 flex justify-between items-center gap-4"
    >
      <div id="header-subject" class="flex items-center gap-3 sm:gap-4 md:gap-6 hidden">
        <div
          id="header-icon-bg"
          class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-lg flex items-center justify-center flex-shrink-0"
        >
          <img id="header-icon" src="" class="w-6 sm:w-8 md:w-10 h-6 sm:h-8 md:h-10" alt="" />
        </div>
        <span
          id="header-subject-title"
          class="text-base sm:text-xl md:text-2xl lg:text-[28px] font-medium text-white"
        ></span>
      </div>

      <div class="flex items-center gap-2 sm:gap-3 md:gap-4 ml-auto">
        <img
          src="./assets/icons/sunny.svg"
          class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6"
          alt="Light mode"
        />
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" class="sr-only peer" checked />
          <div
            class="w-8 h-5 sm:w-10 sm:h-6 md:w-12 md:h-7 bg-purple-600 rounded-full transition-colors"
          ></div>
          <div
            class="absolute left-1 top-0.5 sm:top-1 w-3 h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 bg-white rounded-full transition-transform peer-checked:translate-x-3 sm:peer-checked:translate-x-4 md:peer-checked:translate-x-5"
          ></div>
        </label>
        <img
          src="./assets/icons/moon.svg"
          class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6"
          alt="Dark mode"
        />
      </div>
    </header>

    <main
      class="max-w-7xl mx-auto px-4 sm:px-6 mt-8 sm:mt-12 md:mt-16 lg:mt-24 w-full flex flex-col lg:flex-row justify-between gap-8 md:gap-12 lg:gap-16"
    >
      <section class="flex-1 min-w-0">
        <h1 class="flex flex-col tracking-tight">
          <span class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-light leading-tight">Welcome to the</span>
          <span class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-medium leading-tight">Frontend Quiz!</span>
        </h1>
        <p
          class="text-sm sm:text-base md:text-lg lg:text-xl italic text-blue-300 mt-4 md:mt-6 lg:mt-10"
        >
          Pick a subject to get started.
        </p>
      </section>

      <section
        class="flex-1 w-full flex flex-col gap-3 sm:gap-4 md:gap-6 pb-10 sm:pb-14 md:pb-20"
      >
        <a
          href="quetions.html?subject=HTML"
          class="flex items-center gap-3 sm:gap-4 md:gap-6 lg:gap-8 bg-blue-850 p-4 sm:p-5 md:p-6 rounded-lg sm:rounded-xl md:rounded-2xl lg:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all active:ring-2 active:ring-white/20"
        >
          <div
            class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 lg:w-16 lg:h-16 rounded-lg bg-orange-50 flex items-center justify-center flex-shrink-0"
          >
            <img src="./assets/icons/iconhtml.svg" class="w-6 sm:w-7 md:w-9 lg:w-10" alt="" />
          </div>
          <span class="text-base sm:text-lg md:text-xl lg:text-2xl font-medium">HTML</span>
        </a>

        <a
          href="quetions.html?subject=CSS"
          class="flex items-center gap-3 sm:gap-4 md:gap-6 lg:gap-8 bg-blue-850 p-4 sm:p-5 md:p-6 rounded-lg sm:rounded-xl md:rounded-2xl lg:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all active:ring-2 active:ring-white/20"
        >
          <div
            class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 lg:w-16 lg:h-16 rounded-lg bg-green-100 flex items-center justify-center flex-shrink-0"
          >
            <img src="./assets/icons/iconcss.svg" class="w-6 sm:w-7 md:w-9 lg:w-10" alt="" />
          </div>
          <span class="text-base sm:text-lg md:text-xl lg:text-2xl font-medium">CSS</span>
        </a>

        <a
          href="quetions.html?subject=Javascript"
          class="flex items-center gap-3 sm:gap-4 md:gap-6 lg:gap-8 bg-blue-850 p-4 sm:p-5 md:p-6 rounded-lg sm:rounded-xl md:rounded-2xl lg:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all active:ring-2 active:ring-white/20"
        >
          <div
            class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 lg:w-16 lg:h-16 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0"
          >
            <img src="./assets/icons/iconjs.svg" class="w-6 sm:w-7 md:w-9 lg:w-10" alt="" />
          </div>
          <span class="text-base sm:text-lg md:text-xl lg:text-2xl font-medium">Javascript</span>
        </a>

        <a
          href="quetions.html?subject=Accessibility"
          class="flex items-center gap-3 sm:gap-4 md:gap-6 lg:gap-8 bg-blue-850 p-4 sm:p-5 md:p-6 rounded-lg sm:rounded-xl md:rounded-2xl lg:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all active:ring-2 active:ring-white/20"
        >
          <div
            class="w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 lg:w-16 lg:h-16 rounded-lg bg-purple-100 flex items-center justify-center flex-shrink-0"
          >
            <img
              src="./assets/icons/iconaccses.svg"
              class="w-6 sm:w-7 md:w-9 lg:w-10"
              alt=""
            />
          </div>
          <span class="text-base sm:text-lg md:text-xl lg:text-2xl font-medium">Accessibility</span>
        </a>
      </section>
    </main>
  </body>
</html>
