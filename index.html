<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizz App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <style type="text/tailwindcss">
      @theme {
        /* Font */
        --font-rubik: "Rubik", sans-serif;

        /* Desktop Type Scale */
        --text-h1: 144px;
        --text-h1-line-height: 144px;
        --text-h1-font-weight: 500;

        --text-h2: 64px;
        --text-h2-line-height: 64px;
        --text-h2-font-weight: 500;

        --text-h2-light: 64px;
        --text-h2-light-line-height: 64px;
        --text-h2-light-font-weight: 300;

        --text-h3: 36px;
        --text-h3-line-height: 43px;
        --text-h3-font-weight: 500;

        --text-h4: 28px;
        --text-h4-line-height: 28px;
        --text-h4-font-weight: 500;

        --text-h5: 24px;
        --text-h5-line-height: 36px;
        --text-h5-font-weight: 500;

        --text-h5-regular: 24px;
        --text-h5-regular-line-height: 36px;
        --text-h5-regular-font-weight: 400;

        --text-h6: 20px;
        --text-h6-line-height: 30px;
        --text-h6-font-weight: 400;

        /* Mobile Type Scale */
        --text-h1-mobile: 88px;
        --text-h1-mobile-line-height: 88px;
        --text-h1-mobile-font-weight: 500;

        --text-h2-mobile: 40px;
        --text-h2-mobile-line-height: 40px;
        --text-h2-mobile-font-weight: 500;

        --text-h2-mobile-light: 40px;
        --text-h2-mobile-light-line-height: 40px;
        --text-h2-mobile-light-font-weight: 300;

        --text-h3-mobile: 20px;
        --text-h3-mobile-line-height: 24px;
        --text-h3-mobile-font-weight: 500;

        --text-h4-mobile: 18px;
        --text-h4-mobile-line-height: 18px;
        --text-h4-mobile-font-weight: 500;

        --text-h5-mobile: 14px;
        --text-h5-mobile-line-height: 21px;
        --text-h5-mobile-font-weight: 400;

        /* Tablet Type Scale */
        --text-h2-tablet: 48px;
        --text-h2-tablet-line-height: 48px;
        --text-h2-tablet-font-weight: 500;

        --text-h2-tablet-light: 48px;
        --text-h2-tablet-light-line-height: 48px;
        --text-h2-tablet-light-font-weight: 300;

        --text-h3-tablet: 28px;
        --text-h3-tablet-line-height: 34px;
        --text-h3-tablet-font-weight: 500;

        --text-h4-tablet: 24px;
        --text-h4-tablet-line-height: 24px;
        --text-h4-tablet-font-weight: 500;

        --text-h6-tablet: 18px;
        --text-h6-tablet-line-height: 27px;
        --text-h6-tablet-font-weight: 400;

        /* Colors */
        /* Base */
        --color-white: #ffffff;
        --color-black: #000000;

        /* Grey */
        --color-gray-500: #626c7f;
        --color-gray-50: #f4f6fa;

        /* Blue */
        --color-blue-950: #2d3949;
        --color-blue-900: #313e51;
        --color-blue-850: #3b4d66;
        --color-blue-500: #306aff;
        --color-blue-300: #abc1e1;
        --color-blue-100: #edf1f9;
        --color-blue-50: #ebf0ff;

        /* Green */
        --color-green-500: #2fd887;
        --color-green-100: #e0fdef;

        /* Purple */
        --color-purple-600: #a729f5;
        --color-purple-100: #f6e7ff;

        /* Orange */
        --color-orange-400: #ff7e35;
        --color-orange-50: #fff5ed;

        /* Red */
        --color-red-500: #ee5454;
        /* container */
        --size-container: 1230px;
      }
    </style>
  </head>
  <body
    class="bg-blue-900 min-h-screen relative font-rubik text-white "
  >
    <img
      src="/assets/icons/bgleft.svg"
      class="absolute top-0 left-0 -z-10 w-full md:w-auto opacity-50 lg:opacity-100"
    />
    <img
      src="/assets/icons/bgright.svg"
      class="hidden lg:block absolute bottom-0 right-0 -z-10"
    />

    <header
      class="max-w-[1160px] mx-auto px-6 py-6 md:py-10 lg:pt-24 md:pt-[54px] flex justify-end items-center gap-2 md:gap-4 "
    >
      <img
        src="./assets/icons/sunny.svg"
        class="w-4 h-4 md:w-6 md:h-6"
        alt=""
      />
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" class="sr-only peer" checked />
        <div
          class="w-8 h-5 md:w-12 md:h-7 bg-purple-600 rounded-full transition-colors"
        ></div>
        <div
          class="absolute left-1 top-1 w-3 h-3 md:w-5 md:h-5 bg-white rounded-full transition-transform peer-checked:translate-x-3 md:peer-checked:translate-x-5"
        ></div>
      </label>
      <img src="./assets/icons/moon.svg" class="w-4 h-4 md:w-6 md:h-6" alt="" />
    </header>

    <main
      class="max-w-[1160px] mx-auto px-6 mt-8 md:mt-12 lg:mt-24 flex flex-col lg:flex-row justify-between gap-10 lg:gap-16"
    >
      <section class="flex-1 lg:max-w-[50%]">
        <h1 class="flex flex-col tracking-tight">
          <span class="text-[40px] md:text-[64px] font-light leading-tight"
            >Welcome to the</span
          >
          <span class="text-[40px] md:text-[64px] font-medium leading-tight"
            >Frontend Quiz!</span
          >
        </h1>
        <p
          class="text-[14px] md:text-[20px] italic text-blue-300 mt-4 md:mt-10 lg:mt-12"
        >
          Pick a subject to get started.
        </p>
      </section>

      <section
        class="flex-1 w-full max-w-[564px] flex flex-col gap-3 md:gap-6 pb-20"
      >
        <a
          href="quetions.html?subject=HTML"
          class="flex items-center gap-4 md:gap-8 bg-blue-850 p-3 md:p-5 rounded-xl md:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all shadow-lg"
        >
          <div
            class="w-10 h-10 md:w-14 md:h-14 rounded-lg bg-orange-50 flex items-center justify-center shrink-0"
          >
            <img src="./assets/icons/iconhtml.svg" class="w-7 md:w-10" alt="" />
          </div>
          <span class="text-h5-responsive text-h5">HTML</span>
        </a>

        <a
          href="quetions.html?subject=CSS"
          class="flex items-center gap-4 md:gap-8 bg-blue-850 p-3 md:p-5 rounded-xl md:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all shadow-lg"
        >
          <div
            class="w-10 h-10 md:w-14 md:h-14 rounded-lg bg-green-100 flex items-center justify-center shrink-0"
          >
            <img src="./assets/icons/iconcss.svg" class="w-7 md:w-10" alt="" />
          </div>
          <span class="text-h5-responsive text-h5">CSS</span>
        </a>

        <a
          href="quetions.html?subject=Javascript"
          class="flex items-center gap-4 md:gap-8 bg-blue-850 p-3 md:p-5 rounded-xl md:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all shadow-lg"
        >
          <div
            class="w-10 h-10 md:w-14 md:h-14 rounded-lg bg-blue-50 flex items-center justify-center shrink-0"
          >
            <img src="./assets/icons/iconjs.svg" class="w-7 md:w-10" alt="" />
          </div>
          <span class="text-h5-responsive text-h5">Javascript</span>
        </a>

        <a
          href="quetions.html?subject=Accessibility"
          class="flex items-center gap-4 md:gap-8 bg-blue-850 p-3 md:p-5 rounded-xl md:rounded-3xl hover:ring-2 hover:ring-white/10 transition-all shadow-lg"
        >
          <div
            class="w-10 h-10 md:w-14 md:h-14 rounded-lg bg-purple-100 flex items-center justify-center shrink-0"
          >
            <img
              src="./assets/icons/iconaccses.svg"
              class="w-7 md:w-10"
              alt=""
            />
          </div>
          <span class="text-h5-responsive text-h5"
            >Accessibility</span
          >
        </a>
      </section>
    </main>
  </body>
</html>
